<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#070b13;--bg2:#0b1019;--bg3:#101724;--bg4:#192030;--tx:#e6eaf3;--tx2:#8893a7;--tx3:#55627a;--bd:#182236;--bd2:#243348;--grn:#00f5c4;--grn2:#00d4a6;--grnA:rgba(0,245,196,.11);--blu:#4a94ff;--bluA:rgba(74,148,255,.11);--red:#ff5060;--redA:rgba(255,80,96,.11);--yel:#fbbf24;--yelA:rgba(251,191,36,.11);--org:#ff8a3a;--orgA:rgba(255,138,58,.11);--r:10px;--r2:14px}
body{font-family:'Noto Sans SC','Outfit',sans-serif;background:var(--bg);color:var(--tx);line-height:1.7;min-height:100vh;padding:26px 22px 80px;font-size:15px;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(0,245,196,.04),transparent 60%);pointer-events:none;z-index:0}
a{color:inherit;text-decoration:none}
.w{max-width:1180px;margin:0 auto;position:relative;z-index:1}

/* LOGIN */
.lb{max-width:420px;margin:80px auto 0;text-align:center}
.lb-ic{margin-bottom:22px}
.lb h1{font-size:26px;font-weight:800;margin-bottom:10px;letter-spacing:-.3px}
.lb p{font-size:14px;color:var(--tx2);margin-bottom:26px}
.lb-in{width:100%;background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:14px 18px;color:var(--tx);font-family:inherit;font-size:15px;margin-bottom:14px;transition:.2s}
.lb-in:focus{outline:none;border-color:var(--grn);background:var(--bg3)}
.lb-bt{width:100%;background:linear-gradient(135deg,var(--grn),var(--grn2));color:var(--bg);border:none;border-radius:var(--r);padding:14px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:.2s}
.lb-bt:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,245,196,.25)}
.lb-err{color:var(--red);font-size:13px;margin-top:12px;display:none}
.lb-back{display:inline-block;margin-top:22px;font-size:13px;color:var(--tx3)}

/* HEADER */
.ah{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;flex-wrap:wrap;gap:14px;padding-bottom:22px;border-bottom:1px solid var(--bd)}
.ah-l{display:flex;align-items:center;gap:14px}
.ah-l svg{width:32px;height:32px}
.ah-l h1{font-size:22px;font-weight:800;letter-spacing:-.3px}
.ah-l span{font-size:12px;color:var(--tx3);background:var(--bg2);padding:4px 11px;border-radius:99px;border:1px solid var(--bd)}
.ah-r{display:flex;gap:10px}

/* PANELS */
.pn{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:28px;margin-bottom:22px;scroll-margin-top:80px}
.pn-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid var(--bd);flex-wrap:wrap;gap:10px}
.pn-h h2{font-size:19px;font-weight:700;display:flex;align-items:center;gap:10px;letter-spacing:-.2px}
.pn-h h2 i{font-style:normal}
.pn-hp{font-size:12.5px;color:var(--tx3);margin-bottom:16px;margin-top:-6px;line-height:1.7}

/* QUICK NAV */
.qn{position:sticky;top:0;background:rgba(7,11,19,.94);backdrop-filter:blur(16px);z-index:50;padding:14px 0;margin-bottom:22px;border-bottom:1px solid var(--bd);display:flex;gap:8px;overflow-x:auto;flex-wrap:wrap}
.qn a{padding:8px 16px;background:var(--bg2);border:1px solid var(--bd);border-radius:99px;font-size:12.5px;color:var(--tx2);font-weight:500;cursor:pointer;white-space:nowrap;transition:.2s}
.qn a:hover{border-color:var(--grn);color:var(--grn)}

/* ROWS */
.r{margin-bottom:16px}
.r label{display:block;font-size:12.5px;font-weight:600;color:var(--tx2);margin-bottom:7px;letter-spacing:.2px}
.r input,.r textarea,.r select{width:100%;background:var(--bg);border:1px solid var(--bd);border-radius:8px;padding:11px 14px;color:var(--tx);font-family:inherit;font-size:14.5px;transition:.2s;line-height:1.6}
.r input:focus,.r textarea:focus,.r select:focus{outline:none;border-color:var(--grn)}
.r textarea{min-height:140px;resize:vertical;line-height:1.75;font-family:'JetBrains Mono',monospace;font-size:13.5px}
.r .hp{font-size:11.5px;color:var(--tx3);margin-top:6px;line-height:1.6}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* BUTTONS */
.b{padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:.2s;display:inline-flex;align-items:center;gap:6px;line-height:1.3}
.b-g{background:var(--grn);color:var(--bg)}
.b-o{background:var(--bg3);color:var(--tx);border:1px solid var(--bd)}
.b-r{background:var(--redA);color:var(--red);border:1px solid rgba(255,80,96,.15)}
.b-b{background:var(--bluA);color:var(--blu);border:1px solid rgba(74,148,255,.15)}
.b-y{background:var(--yelA);color:var(--yel);border:1px solid rgba(251,191,36,.15)}
.b:hover{transform:translateY(-1px);opacity:.92}
.b:disabled{opacity:.55;cursor:wait;transform:none}
.ba{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}

/* COIN LIST */
.ci{display:flex;align-items:center;gap:9px;padding:11px 14px;background:var(--bg);border:1px solid var(--bd);border-radius:8px;margin-bottom:7px;flex-wrap:wrap}
.ci input{flex:1;min-width:60px;font-family:'JetBrains Mono',monospace;font-size:12.5px;padding:8px 10px}
.ci .rm{background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;padding:2px 6px}

/* ARTICLE LIST */
.al{padding:14px 16px;background:var(--bg);border:1px solid var(--bd);border-radius:9px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.al h4{font-size:14.5px;font-weight:600;margin-bottom:4px;line-height:1.4}
.al .am{font-size:11.5px;color:var(--tx3)}
.al .lb-indi{display:inline-flex;gap:4px;margin-left:8px}
.al .lb-indi span{font-size:9.5px;padding:2px 7px;border-radius:99px;font-weight:600;background:var(--bg3);color:var(--tx2)}
.al .lb-indi span.on{background:var(--grnA);color:var(--grn)}

/* ARTICLE EDITOR */
.edg{display:grid;grid-template-columns:1fr;gap:16px;margin-top:14px}
.edg-full{grid-column:1/-1}
.lbl-tag{display:inline-block;padding:4px 12px;border-radius:99px;font-size:12px;font-weight:700;background:var(--bluA);color:var(--blu);margin-bottom:6px}
.lbl-tag.zh{background:var(--grnA);color:var(--grn)}
.lang-block{background:var(--bg);border:1px solid var(--bd);border-radius:11px;padding:20px;margin-top:14px}
.lang-block-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px}

/* AUTO-TRANSLATE */
.tg-box{background:linear-gradient(135deg,rgba(0,245,196,.04),rgba(74,148,255,.03));border:1px solid rgba(0,245,196,.15);border-radius:11px;padding:16px 18px;margin-bottom:18px}
.tg-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.tg-lbl{font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:7px}
.tg-sw{position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0}
.tg-sw input{opacity:0;width:0;height:0}
.tg-sl{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--bg3);border:1px solid var(--bd);transition:.3s;border-radius:24px}
.tg-sl::before{content:"";position:absolute;height:16px;width:16px;left:3px;bottom:3px;background:var(--tx2);transition:.3s;border-radius:50%}
input:checked+.tg-sl{background:var(--grnA);border-color:var(--grn)}
input:checked+.tg-sl::before{transform:translateX(20px);background:var(--grn)}
.tg-hint{font-size:11.5px;color:var(--tx3);margin-top:7px;line-height:1.6}

/* TOAST */
.ts{position:fixed;top:22px;right:22px;background:var(--grn);color:var(--bg);padding:12px 22px;border-radius:var(--r);font-size:13.5px;font-weight:600;z-index:9999;transform:translateX(120%);transition:.3s;max-width:360px}
.ts.sh{transform:translateX(0)}
.ts.err{background:var(--red);color:#fff}

/* CHECKBOX LABEL */
.cb{display:inline-flex;align-items:center;gap:7px;cursor:pointer;font-size:13px}
.cb input{width:auto;margin:0}

/* PROGRESS */
.prog{display:none;background:var(--bg3);padding:12px 16px;border-radius:9px;margin:14px 0;font-size:13px;color:var(--yel);border-left:3px solid var(--yel);line-height:1.6}
.prog.sh{display:block}

@media(max-width:720px){.edg{grid-template-columns:1fr}.row2{grid-template-columns:1fr}.ah{flex-direction:column;align-items:flex-start}.pn{padding:20px}body{padding:18px 14px 60px}.qn{gap:6px}.qn a{padding:6px 12px;font-size:11.5px}}

/* Clock bar */
.clk-bar{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:10px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.clk-l{display:flex;align-items:center;flex-wrap:wrap;gap:4px}

/* Stats dashboard */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:18px}
.stat{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:14px 16px;text-align:center}
.stat .sv{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:800;line-height:1.1;margin-bottom:4px}
.stat .sl{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;font-weight:600}

/* Article search box */
.asb{margin-bottom:12px;position:relative}
.asb input{padding-left:38px;background:var(--bg)}
.asb::before{content:'🔍';position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.5;pointer-events:none}

/* Help modal */
.help-bd{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.help-bd.sh{display:flex}
.help-bx{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:28px;max-width:520px;width:100%;max-height:86vh;overflow-y:auto}
.help-bx h2{font-size:20px;margin-bottom:18px;display:flex;align-items:center;gap:9px}
.help-bx table{width:100%;border-collapse:collapse;font-size:13.5px}
.help-bx td{padding:9px 4px;border-bottom:1px solid var(--bd);line-height:1.6}
.help-bx kbd{background:var(--bg3);border:1px solid var(--bd);border-radius:5px;padding:2px 8px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;color:var(--grn);display:inline-block;min-width:22px;text-align:center}
.help-bx .kbs{display:flex;gap:4px;flex-wrap:wrap}

/* Exchange card editor */
.ex-card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r2);padding:18px;margin-bottom:14px}
.ex-head{display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding-bottom:14px;border-bottom:1px solid var(--bd);margin-bottom:4px}
.ex-handle{display:flex;gap:4px}
.ex-logo{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-family:'Outfit',sans-serif;font-size:14px;flex-shrink:0}
.ex-lang{margin-top:14px;background:var(--bg);border:1px solid var(--bd);border-radius:9px;padding:14px}
.ex-lang summary{cursor:pointer;font-size:13px;font-weight:600;color:var(--tx2);padding:4px 0;user-select:none}
.ex-lang[open]{padding-bottom:14px}
.lang-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.lang-row>input{flex:1;min-width:100px}
.lang-tag{display:inline-block;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:700;background:var(--bg3);color:var(--tx2);min-width:48px;text-align:center}

/* Link management */
.link-group{background:var(--bg);border:1px solid var(--bd);border-radius:var(--r);padding:18px}
</style>
</head>

      zh:`选择加密货币交易所是你进入加密世界的**第一步**，也是最容易踩坑的一步。本文根据 2025 年最新监管环境和实测经验，帮你彻底理清思路。\n\n## 为什么交易所的选择这么重要？\n\n交易所掌管你的资产、你的身份验证信息，甚至决定你能接触哪些币种。选错了，可能面临资金冻结、提现困难、甚至平台跑路的风险。2022 年 FTX 暴雷是最惨痛的教训。\n\n## 7 个必看指标\n\n### 1. 合规牌照\n优先选择拿到**多国金融监管牌照**的平台。比如美国 MSB、欧盟 MiCA、香港 VASP 等。\n\n### 2. Proof of Reserves（储备金证明）\n这是 FTX 事件后行业自发建立的透明度机制。交易所需要**定期公开链上地址**，证明用户资产 100% 对应真实储备。\n\n### 3. 交易深度\n打开交易所的 BTC/USDT 交易对，看**买一和卖一的挂单量**。流动性差的交易所会有严重滑点。\n\n### 4. 费率结构\n- **Maker / Taker 费率**：OKX 0.08% / 0.1% 是目前头部最低\n- **提币费**：不同币种差异很大，定期关注\n- **隐藏费用**：警惕所谓"零手续费"背后的点差\n\n### 5. 法币通道\n- 本地银行卡充提（信用卡、借记卡）\n- P2P/C2C 点对点交易\n- 第三方支付合作（Apple Pay 等）\n\n### 6. 用户端安全\n- 强制开启 2FA（Google Authenticator）\n- 资金密码和登录密码分离\n- 提现白名单\n\n### 7. 客服响应速度\n深夜发工单，看多久能收到真人回复。遇到问题时这可能决定你的资产安全。\n\n## 2025 年推荐的三家主流交易所\n\n### OKX（综合推荐）\n- 合规：获得香港 VASP、阿联酋 VARA 等多国牌照\n- 透明度：每月公布 Merkle Tree Proof of Reserves\n- 费率：新户可领取手续费折扣\n- 缺点：美国用户无法使用\n\n### Binance（流量最大）\n- 合规：多国分支机构持牌运营\n- 交易对最丰富，流动性第一\n- Launchpad 新项目首发\n- 缺点：对中国大陆和美国纽约州用户有限制\n\n### Bybit（衍生品首选）\n- 专业衍生品平台，最高 100 倍杠杆\n- API 友好，量化交易者首选\n- 跟单交易功能成熟\n- 缺点：现货币种数量少于 OKX\n\n## 新手实操建议\n\n1. **不要只用一家交易所**。资产分散到 2-3 家是基本原则\n2. **小额测试提现流程**再开始大额交易\n3. **开启 2FA + 白名单**是最基本的安全措施\n4. **保留每次交易记录**，涉及税务申报\n\n## 结语\n\n选择交易所就像选银行。要看监管、看透明度、看费率、看服务。2025 年的加密世界已经比几年前成熟很多，但"**不要把所有资产放在一个篮子**"这条铁律永远不会过时。`,
      'zh-TW':'','en':'','ko':''
    }
  },

    title:{zh:'OKX 注册全流程图解（含 KYC、安全设置）2025 最新','zh-TW':'OKX 註冊全流程圖解（含 KYC、安全設定）2025 最新',en:'Complete OKX Registration Guide with KYC & Security Setup (2025)',ko:'OKX 가입 전 과정 가이드 (KYC·보안 설정 포함) 2025 최신판'},
    exc:{zh:'从注册账号到完成 KYC、开启二次验证、绑定银行卡，本文把 OKX 注册全流程拆成 12 步逐一图解，新手 15 分钟就能完成。','zh-TW':'從註冊帳號到完成 KYC、開啟二次驗證、綁定銀行卡，本文把 OKX 註冊全流程拆成 12 步逐一圖解，新手 15 分鐘就能完成。',en:'From account creation to KYC, 2FA, and card binding — we break down OKX onboarding into 12 easy steps. Beginners complete it in 15 minutes.',ko:'계정 생성부터 KYC, 2단계 인증, 카드 연동까지 — OKX 가입 전 과정을 12단계로 나누어 설명합니다. 초보자도 15분이면 완료.'},
    tag:{zh:'OKX教程','zh-TW':'OKX教程',en:'OKX Tutorial',ko:'OKX 튜토리얼'},
    cnt:{
      zh:`本文是 2025 年 OKX 注册的**完整操作指南**，覆盖从零到完成第一笔法币充值的每一步。全程不超过 20 分钟。\n\n## 准备工作\n\n注册前请准备：\n\n- **邮箱或手机号**（邮箱推荐 Gmail）\n- **身份证或护照**（KYC 用）\n- **信用卡或银行卡**（可选，用于充值）\n- **Google Authenticator** 应用（手机上先装好）\n\n## 第一步：访问 OKX 官网\n\n浏览器输入 **www.okx.com**，注意网址末尾一定是 .com，避免钓鱼网站。\n\n> ⚠️ 永远只从书签或直接输入官网进入，**不要点搜索引擎的广告链接**。\n\n## 第二步：注册账号\n\n点击右上角 "Sign Up / 注册"，选择邮箱或手机号注册：\n\n- 邮箱：输入邮箱 + 设置密码（至少 8 位，包含大小写和数字）\n- 手机号：输入国家区号 + 手机号\n\n## 第三步：验证邮箱/短信\n\n收到 6 位验证码后填入，账号初步创建完成。\n\n## 第四步：完成基础信息\n\n填写：\n\n- 居住国家/地区\n- 用户协议勾选\n- 推荐码（可选，新户有手续费折扣）\n\n## 第五步：KYC 身份认证\n\n**Level 1（基础）**：\n- 填写真实姓名\n- 上传身份证/护照正反面\n- 人脸识别\n\n通常 10 分钟内审核通过。\n\n**Level 2（高级）**：\n- 地址证明（水电账单或银行对账单）\n- 用于更高提现额度\n\n## 第六步：开启 2FA（最重要）\n\n进入「安全中心」→ Google Authenticator：\n\n1. 打开手机的 Google Authenticator 应用\n2. 扫描 OKX 页面显示的二维码\n3. **把 16 位密钥抄写在纸上保存**（丢手机时的救命稻草）\n4. 输入 6 位动态码完成绑定\n\n## 第七步：设置资金密码\n\n「安全中心」→ 资金密码。这个密码**与登录密码不同**，用于提币等敏感操作。\n\n## 第八步：防钓鱼码\n\n设置一个只有你自己知道的 4-6 位字符。以后 OKX 发给你的官方邮件都会带这个码，**没有这个码的邮件都是诈骗**。\n\n## 第九步：开启白名单\n\n「提币地址管理」→ 开启白名单模式。只有预先添加的地址才能提币，即使账号被盗也能保住资产。\n\n## 第十步：首次入金\n\n选择方式：\n\n- **C2C 买币**（推荐新手）：用支付宝/微信向卖家付款，对方释放 USDT\n- **信用卡购买**：手续费较高但最快\n- **加密货币转入**：从其他钱包或交易所转入 BTC/USDT\n\n## 第十一步：买入第一笔币\n\n进入「现货交易」：\n\n1. 选择交易对（建议从 BTC/USDT 开始）\n2. 选择「限价」或「市价」单\n3. 输入金额（建议先小额测试）\n4. 确认下单\n\n## 第十二步：备份一切\n\n注册完成后：\n\n- [ ] 2FA 密钥已抄写保存（纸质）\n- [ ] 资金密码已记录（密码管理器）\n- [ ] 防钓鱼码已设置\n- [ ] 提币白名单已开启\n- [ ] 首次小额提币测试成功\n\n## 常见问题\n\n**Q：为什么我的 KYC 被拒？**\n可能原因：照片模糊、证件过期、姓名拼写错误。重新上传清晰照片通常能通过。\n\n**Q：2FA 的手机丢了怎么办？**\n用最初抄写的 16 位密钥在新手机重新添加。如果也丢了，联系客服做账号申诉（耗时较长）。\n\n**Q：C2C 交易被骗怎么办？**\n一定要选 OKX 认证的商家，通过平台的聊天系统沟通，**任何让你转微信私聊的都是骗子**。\n\n## 结语\n\n完成以上 12 步，你的 OKX 账户就是**可以放心长期使用**的状态了。记住加密世界的第一定律：**自己的安全自己守**，交易所再强大也不能替你管理 2FA 密钥。`,

  {id:1003,date:'',pub:1,featured:0,
    title:{zh:'加密货币交易手续费深度对比：哪家真的最省钱？','zh-TW':'加密貨幣交易手續費深度比較：哪家真的最省錢？',en:'Crypto Trading Fee Deep Comparison: Which Exchange Actually Saves You Money?',ko:'암호화폐 거래 수수료 심층 비교: 실제로 돈을 아끼는 거래소는?'},
    exc:{zh:'除了挂牌费率，点差、资金费率、提币费、滑点都是真金白银的成本。本文用 10 万美元模拟交易测算三大交易所的实际总成本。','zh-TW':'除了掛牌費率，點差、資金費率、提幣費、滑點都是真金白銀的成本。本文用 10 萬美元模擬交易測算三大交易所的實際總成本。',en:'Beyond listed fees, spread, funding rate, withdrawal fees and slippage are all real costs. We simulate $100K trades across 3 exchanges.',ko:'게시된 수수료 외에도 스프레드, 자금 조달 수수료, 출금 수수료, 슬리피지가 모두 실제 비용입니다. 10만 달러 거래 시뮬레이션으로 비교.'},
    tag:{zh:'费率对比','zh-TW':'費率比較',en:'Fee Comparison',ko:'수수료 비교'},
    cnt:{
      zh:`"**OKX 手续费最低**" 这种说法只对了一半。真实成本 = 挂牌费率 + 点差 + 提币费 + 滑点。本文用数据说话。\n\n## 什么构成你的真实成本？\n\n### 1. 挂牌费率（Fee Tier）\n\n这是最显性的成本，但不同交易所的**VIP 等级升级规则差异巨大**：\n\n- OKX：30 天交易量 > $10K 即可升到 Lv1（0.07%/0.09%）\n- Binance：30 天交易量 > $1M 才能升到 VIP1\n- Bybit：类似 Binance\n\n对**中小散户来说，OKX 升级更快**，实际费率通常更低。\n\n### 2. 点差（Spread）\n\n盘口的买卖价差。**在冷门币种上，点差可能比手续费还高 10 倍**。\n\n实测 2025 年 3 月（$100K 挂单）：\n\n| 交易对 | OKX | Binance | Bybit |\n|---|---|---|---|\n| BTC/USDT | 0.01% | 0.01% | 0.01% |\n| 某小币/USDT | 0.08% | 0.12% | 0.15% |\n\n### 3. 提币费\n\n提币费差异巨大：\n\n- BTC 提币（Bitcoin 网络）：约 $2-5\n- ETH 提币（以太坊网络）：$3-15\n- USDT-TRC20：约 $1（便宜）\n- USDT-ERC20：$5-20（贵）\n\n**结论：大额转账走 TRC20，小额或特殊用途才用 ERC20。**\n\n### 4. 资金费率（仅合约）\n\n永续合约每 8 小时结算一次资金费率，长期持仓的**年化成本可达 10% 以上**，容易被新手忽略。\n\n## 实战模拟：$100,000 月交易量\n\n假设你一个月买卖 10 次 BTC，每次 $10,000：\n\n### OKX（Lv1）\n- 手续费：10 × $10,000 × 0.09% × 2 = $180\n- 点差：10 × $10,000 × 0.01% × 2 = $20\n- 提币 1 次 BTC：$3\n- **总计：$203**\n\n### Binance（普通用户）\n- 手续费：10 × $10,000 × 0.1% × 2 = $200\n- 点差：$20\n- 提币：$5\n- **总计：$225**\n\n### Bybit（普通用户）\n- 手续费：$200\n- 点差：$20\n- 提币：$3\n- **总计：$223**\n\n**差距：约 10-12%**，一年可节省 $200+。\n\n## 如何进一步降低成本？\n\n### 1. 用 Maker 单而非 Taker 单\n\nMaker（挂单）几乎所有交易所都比 Taker（吃单）便宜 20-30%。\n\n### 2. 用原生代币抵扣\n\n- Binance 用 BNB 抵扣可省 25%\n- OKX 用 OKB 也有类似优惠\n\n### 3. 合理使用推荐码\n\n新用户通过推荐码注册，**前 30 天或 3 个月手续费通常有 20% 折扣**。\n\n### 4. 跨平台套利时注意提币成本\n\n有时候看到两家交易所同币种有 0.5% 差价，但加上两次提币费和时间成本，实际套不到多少。\n\n## 结语\n\n**低费率 ≠ 省钱**。真正的成本控制需要：\n\n- 优先用 Maker 单\n- 大额选 OKX，长期衍生品交易选 Bybit，币种丰富度选 Binance\n- 小额提现走 TRC20\n- 长期持仓避免高杠杆合约\n\n费率差距放大到年度，够买一部好手机了。`,
      'zh-TW':'','en':'','ko':''
    }
  },

// NETWORK TIME SYSTEM
// ═══════════════════════════════════════════════
let NET_OFFSET=0,NET_OK=false,NET_LAST=0,NET_SRC='';
async function syncTime(silent){
  const sources=[
    {n:'OKX',u:'https://www.okx.com/api/v5/public/time',p:r=>parseInt(r.data?.[0]?.ts)},
    {n:'WorldTimeAPI',u:'https://worldtimeapi.org/api/timezone/Etc/UTC',p:r=>new Date(r.utc_datetime).getTime()},
    {n:'TimeAPI',u:'https://timeapi.io/api/Time/current/zone?timeZone=UTC',p:r=>new Date(r.dateTime+'Z').getTime()}
  ];
  for(const src of sources){
    try{
      const t0=Date.now();
      const r=await fetch(src.u,{cache:'no-store'});
      if(!r.ok)continue;
      const d=await r.json();
      const ms=src.p(d);
      if(!ms||isNaN(ms))continue;
      NET_OFFSET=ms+(Date.now()-t0)/2-Date.now();
      NET_OK=true;NET_LAST=Date.now();NET_SRC=src.n;
      updClock();
      if(!silent)tst(`✓ 网络时间已同步 (${src.n})`);
      return true;
    }catch(e){}
  }
  NET_OK=false;updClock();
  if(!silent)tst('⚠️ 网络时间同步失败，使用本地时间',1);
  return false;
}
function netNow(){return new Date(Date.now()+NET_OFFSET)}
function fmtT(d){return d.getUTCFullYear()+'-'+String(d.getUTCMonth()+1).padStart(2,'0')+'-'+String(d.getUTCDate()).padStart(2,'0')+' '+String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0')+':'+String(d.getUTCSeconds()).padStart(2,'0')+' UTC'}
function updClock(){
  const el=document.getElementById('clk');if(!el)return;
  const n=netNow();
  const badge=NET_OK?`<span style="color:var(--grn)">● ${NET_SRC}</span>`:`<span style="color:var(--yel)">● 本地时间</span>`;
  const age=NET_LAST?Math.round((Date.now()-NET_LAST)/1000):0;
  el.innerHTML=`<span>${fmtT(n)}</span> · ${badge}${NET_LAST?` · ${age<60?age+'秒':Math.round(age/60)+'分'}前同步`:''}`;
}
setInterval(updClock,1000);
setInterval(()=>syncTime(1),30*60*1000);

// GOOGLE TRANSLATE API (free, unofficial)
// ══════════════════════════════════════════════════════════════
// Maps our language codes → Google Translate codes
const GT_MAP={zh:'zh-CN','zh-TW':'zh-TW',en:'en',ko:'ko'};

async function translateOne(text,srcLang,tgtLang){
  if(!text||!text.trim())return'';
  if(srcLang===tgtLang)return text;
  const sl=GT_MAP[srcLang]||srcLang,tl=GT_MAP[tgtLang]||tgtLang;
  try{
    const url='https://translate.googleapis.com/translate_a/single?client=gtx&sl='+sl+'&tl='+tl+'&dt=t&q='+encodeURIComponent(text);
    const r=await fetch(url);
    if(!r.ok)throw new Error('GT '+r.status);
    const d=await r.json();
    return d[0].map(x=>x[0]).filter(Boolean).join('');
  }catch(e){
    // Fallback: MyMemory API
    try{
      const lp=sl.split('-')[0]+'|'+tl.split('-')[0];
      const r=await fetch('https://api.mymemory.translated.net/get?q='+encodeURIComponent(text.slice(0,500))+'&langpair='+lp);
      const d=await r.json();
      return d.responseData?.translatedText||text;
    }catch(e2){
      throw new Error('All translation services failed');
    }
  }
}

// Translate long markdown content: split by paragraphs, translate each
async function translateLong(text,srcLang,tgtLang){
  if(!text||!text.trim())return'';
  if(srcLang===tgtLang)return text;
  // Split by double newlines (paragraphs) to preserve structure
  const parts=text.split(/\n{2,}/);
  const out=[];
  for(const p of parts){
    if(!p.trim()){out.push(p);continue}
    // Further chunk if too long (URL limit ~2000 chars)
    if(p.length<=1500){
      out.push(await translateOne(p,srcLang,tgtLang));
    }else{
      // split by single newlines
      const lines=p.split('\n');
      const lineOut=[];
      for(const ln of lines){
        if(!ln.trim()){lineOut.push(ln);continue}
        lineOut.push(await translateOne(ln,srcLang,tgtLang));
      }
      out.push(lineOut.join('\n'));
    }
    // Small delay to avoid rate limit
    await new Promise(r=>setTimeout(r,150));
  }
  return out.join('\n\n');
}

function moveEx(i,d){
  const t=i+d;if(t<0||t>=D.exs.length)return;
  [D.exs[i],D.exs[t]]=[D.exs[t],D.exs[i]];
  sv(D);render();
}
function addEx(){
  const id='exchange'+(D.exs.length+1);
  D.exs.push({id,url:'',ft:0,logo:'EX',color:'#4a94ff',
    name:{zh:'新交易所','zh-TW':'',en:'New Exchange',ko:''},
    sub:{zh:'','zh-TW':'',en:'',ko:''},
    features:{zh:[],'zh-TW':[],en:[],ko:[]}
  });
  sv(D);render();tst('✓ 已添加，请完善信息');
}
function saveExs(){
  $$('[data-ex]').forEach(inp=>{
    const i=+inp.dataset.ex,f=inp.dataset.f,l=inp.dataset.l;
    if(!D.exs[i])return;
    if(f==='features'){
      D.exs[i].features=D.exs[i].features||{};
      D.exs[i].features[l]=inp.value.split('\n').map(s=>s.trim()).filter(Boolean);
    }else if(l){
      D.exs[i][f]=D.exs[i][f]||{};
      D.exs[i][f][l]=inp.value;
    }else{
      D.exs[i][f]=inp.value;
    }
  });
  $$('[data-ft]').forEach(cb=>{D.exs[+cb.dataset.ft].ft=cb.checked?1:0});
  D.exs=D.exs.filter(e=>e.id);
  sv(D);render();tst('✓ 全部交易所已保存');
}
async function trExField(i,tgtLang){
  const ex=D.exs[i];const btn=event.target;const orig=btn.textContent;
  btn.disabled=true;btn.textContent='⏳';
  try{
    if(ex.name?.zh&&!$(`[data-ex="${i}"][data-f="name"][data-l="${tgtLang}"]`).value){
      $(`[data-ex="${i}"][data-f="name"][data-l="${tgtLang}"]`).value=await translateOne(ex.name.zh,'zh',tgtLang);
    }
    if(ex.sub?.zh&&!$(`[data-ex="${i}"][data-f="sub"][data-l="${tgtLang}"]`).value){
      $(`[data-ex="${i}"][data-f="sub"][data-l="${tgtLang}"]`).value=await translateOne(ex.sub.zh,'zh',tgtLang);
    }
    tst('✓ 翻译完成');
  }catch(e){tst('翻译失败','err')}
  finally{btn.disabled=false;btn.textContent=orig}
}
async function trExFeatures(i){
  const ex=D.exs[i];const src=ex.features?.zh||[];if(!src.length){tst('简中特性为空','err');return}
  const btn=event.target;const orig=btn.textContent;btn.disabled=true;btn.textContent='⏳ 翻译中...';
  try{
    for(const lang of ['zh-TW','en','ko']){
      const target=[];for(const line of src){target.push(await translateOne(line,'zh',lang))}
      $(`[data-ex="${i}"][data-f="features"][data-l="${lang}"]`).value=target.join('\n');
    }
    tst('✓ 特性已翻译到 3 语');
  }catch(e){tst('翻译失败: '+e.message,'err')}
  finally{btn.disabled=false;btn.textContent=orig}
}

// Filter articles by search query (no re-render for speed)
function filterArts(q){

// Read current editor state
function readEd(){
  const ls=['zh','zh-TW','en','ko'];
  const o={title:{},exc:{},cnt:{},tag:{}};
  ls.forEach(l=>{
    o.title[l]=$('#t_'+l).value;
    o.exc[l]=$('#e_'+l).value;

// Translate a single field to one target language
async function trField(field,tgtLang){
  const src=$('#'+field[0]+'_zh').value;
  if(!src||!src.trim()){tst('中文原文为空','err');return}
  const btn=event.target;const orig=btn.textContent;
  btn.disabled=true;btn.textContent='⏳ 翻译中...';
  try{
    const fn=(field==='cnt'||field==='exc')?translateLong:translateOne;
    const res=await fn(src,'zh',tgtLang);
    $('#'+field[0]+'_'+tgtLang).value=res;
    tst('✓ 翻译完成');
  }catch(e){tst('翻译失败: '+e.message,true)}
  finally{btn.disabled=false;btn.textContent=orig}
}

// Translate all fields to one target language
async function trLang(tgtLang){
  const src_t=$('#t_zh').value,src_e=$('#e_zh').value,src_c=$('#c_zh').value,src_g=$('#g_zh').value;
  if(!src_t.trim()&&!src_c.trim()){tst('中文内容为空','err');return}
  const btn=event.target;const orig=btn.textContent;
  btn.disabled=true;btn.textContent='⏳ 翻译中...';
  const p=$('#prog');p.classList.add('sh');p.textContent='翻译中: '+tgtLang+' ...';
  try{
    if(src_t.trim()){p.textContent='['+tgtLang+'] 翻译标题中...';$('#t_'+tgtLang).value=await translateOne(src_t,'zh',tgtLang)}
    if(src_g.trim()){p.textContent='['+tgtLang+'] 翻译标签中...';$('#g_'+tgtLang).value=await translateOne(src_g,'zh',tgtLang)}
    if(src_e.trim()){p.textContent='['+tgtLang+'] 翻译摘要中...';$('#e_'+tgtLang).value=await translateLong(src_e,'zh',tgtLang)}
    if(src_c.trim()){p.textContent='['+tgtLang+'] 翻译内容中...';$('#c_'+tgtLang).value=await translateLong(src_c,'zh',tgtLang)}
    p.textContent='✓ '+tgtLang+' 翻译完成';setTimeout(()=>p.classList.remove('sh'),1500);
    tst('✓ '+tgtLang+' 翻译完成');
  }catch(e){p.textContent='❌ 翻译失败: '+e.message;tst('翻译失败','err')}
  finally{btn.disabled=false;btn.textContent=orig}
}

// Translate to all 3 target languages
async function trAll(){
  const src_t=$('#t_zh').value,src_c=$('#c_zh').value;
  if(!src_t.trim()&&!src_c.trim()){tst('请先填写中文内容','err');return}
  const btn=event.target;const orig=btn.textContent;
  btn.disabled=true;btn.textContent='⏳ 翻译中...';
  const p=$('#prog');p.classList.add('sh');
  const targets=['en','zh-TW','ko'];
  try{
    for(const lg of targets){
      p.textContent='翻译到 '+lg+' ...';
      const src_e=$('#e_zh').value,src_g=$('#g_zh').value;
      if(src_t.trim())$('#t_'+lg).value=await translateOne(src_t,'zh',lg);
      if(src_g.trim())$('#g_'+lg).value=await translateOne(src_g,'zh',lg);
      if(src_e.trim())$('#e_'+lg).value=await translateLong(src_e,'zh',lg);
      if($('#c_zh').value.trim())$('#c_'+lg).value=await translateLong($('#c_zh').value,'zh',lg);
    }
    p.textContent='✓ 全部翻译完成！';setTimeout(()=>p.classList.remove('sh'),2000);
    tst('✓ 已翻译到英文、繁体、韩文');
  }catch(e){p.textContent='❌ 翻译失败: '+e.message;tst('翻译失败: '+e.message,true)}
  finally{btn.disabled=false;btn.textContent=orig}
}

async function svArt(id){
  const o=readEd();
  const autoT=$('#art_at').checked;
  // Sync toggle state to D.autoTL (so it persists across sessions)
  if(D.autoTL!==(autoT?1:0)){D.autoTL=autoT?1:0}
  // If auto-translate is on and Chinese has content but other langs are empty, translate them
  if(autoT&&o.title.zh&&o.title.zh.trim()){
    const p=$('#prog');p.classList.add('sh');
    try{
      for(const lg of ['en','zh-TW','ko']){
        if(!o.title[lg]?.trim()&&o.title.zh){p.textContent='自动翻译 '+lg+' 标题...';o.title[lg]=await translateOne(o.title.zh,'zh',lg)}
        if(!o.exc[lg]?.trim()&&o.exc.zh){p.textContent='自动翻译 '+lg+' 摘要...';o.exc[lg]=await translateLong(o.exc.zh,'zh',lg)}
        if(!o.cnt[lg]?.trim()&&o.cnt.zh){p.textContent='自动翻译 '+lg+' 内容...';o.cnt[lg]=await translateLong(o.cnt.zh,'zh',lg)}
        if(!o.tag[lg]?.trim()&&o.tag.zh){p.textContent='自动翻译 '+lg+' 标签...';o.tag[lg]=await translateOne(o.tag.zh,'zh',lg)}
      }
      p.classList.remove('sh');
    }catch(e){p.textContent='自动翻译失败，仅保存已填写内容';setTimeout(()=>p.classList.remove('sh'),2000)}
  }
  const art={id,...o};
  const i=D.arts.findIndex(x=>x.id===id);
  if(i>=0)D.arts[i]=art;else D.arts.unshift(art);
  sv(D);EA=null;render();tst('✓ 文章已保存');
}
