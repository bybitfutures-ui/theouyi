<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1019"/>
      <stop offset="100%" stop-color="#070b13"/>
    </linearGradient>
    <linearGradient id="grn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5c4"/>
      <stop offset="100%" stop-color="#00d4a8"/>
    </linearGradient>
    <linearGradient id="txtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5c4"/>
      <stop offset="100%" stop-color="#4a94ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="rgba(0,245,196,0.18)"/>
      <stop offset="100%" stop-color="rgba(0,245,196,0)"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="30"/></filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Subtle grid pattern -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472" x2="1200" y2="472"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Glowing orbit decoration (top right) -->
  <g opacity="0.25" filter="url(#blur)">
    <circle cx="1050" cy="140" r="80" fill="#00f5c4"/>
  </g>

  <!-- Orbit circles -->
  <g opacity="0.55" transform="translate(1000,155)">
    <circle r="90" fill="none" stroke="rgba(0,245,196,0.35)" stroke-width="1.5"/>
    <ellipse rx="90" ry="32" fill="none" stroke="rgba(0,245,196,0.22)" stroke-width="1.5" transform="rotate(-25)"/>
    <circle r="16" fill="url(#grn)"/>
  </g>

  <!-- Main content block -->
  <g transform="translate(80,80)">
    <!-- Top badge -->
    <g>
      <rect x="0" y="0" width="230" height="36" rx="18" fill="rgba(0,245,196,0.08)" stroke="rgba(0,245,196,0.25)" stroke-width="1"/>
      <circle cx="22" cy="18" r="5" fill="#00f5c4"/>
      <text x="38" y="24" fill="#00f5c4" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="600" letter-spacing="1.5">INDEPENDENT · 2026 EDITION</text>
    </g>

    <!-- Logo row -->
    <g transform="translate(0,72)">
      <circle cx="26" cy="26" r="22" fill="rgba(0,245,196,0.14)"/>
      <circle cx="26" cy="26" r="16" fill="none" stroke="#00f5c4" stroke-width="2.5"/>
      <circle cx="26" cy="26" r="6" fill="#00f5c4"/>
      <text x="64" y="36" fill="#ffffff" font-family="Inter,system-ui,sans-serif" font-size="28" font-weight="800" letter-spacing="-0.5">OuYi <tspan fill="#00f5c4">Hub</tspan></text>
    </g>

    <!-- Main title -->
    <text x="0" y="210" fill="#ffffff" font-family="Inter,system-ui,sans-serif" font-size="76" font-weight="900" letter-spacing="-2">Your Crypto</text>
    <text x="0" y="295" font-family="Inter,system-ui,sans-serif" font-size="76" font-weight="900" letter-spacing="-2" fill="url(#txtGrad)">Exchange Guide</text>

    <!-- Subtitle -->
    <text x="0" y="360" fill="#a8b1c2" font-family="Inter,system-ui,sans-serif" font-size="26" font-weight="400" letter-spacing="-0.2">Independent tutorials · Live prices · 4 languages</text>

    <!-- Feature chips -->
    <g transform="translate(0,410)" font-family="Inter,system-ui,sans-serif" font-size="15" font-weight="600">
      <g>
        <rect width="108" height="42" rx="21" fill="rgba(0,245,196,0.1)" stroke="rgba(0,245,196,0.3)"/>
        <text x="54" y="27" text-anchor="middle" fill="#00f5c4">OKX</text>
      </g>
      <g transform="translate(120,0)">
        <rect width="128" height="42" rx="21" fill="rgba(240,180,30,0.1)" stroke="rgba(240,180,30,0.3)"/>
        <text x="64" y="27" text-anchor="middle" fill="#f0b41e">Binance</text>
      </g>
      <g transform="translate(260,0)">
        <rect width="108" height="42" rx="21" fill="rgba(255,138,58,0.1)" stroke="rgba(255,138,58,0.3)"/>
        <text x="54" y="27" text-anchor="middle" fill="#ff8a3a">Bybit</text>
      </g>
    </g>

    <!-- Language tags -->
    <g transform="translate(0,480)" font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="500" fill="#6b7280">
      <text y="18">简体中文  ·  繁體中文  ·  English  ·  한국어</text>
    </g>
  </g>

  <!-- Right side: stat cards -->
  <g transform="translate(750,310)">
    <!-- BTC card -->
    <g>
      <rect x="0" y="0" width="180" height="96" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
      <circle cx="24" cy="24" r="14" fill="rgba(247,147,26,0.18)"/>
      <text x="24" y="28" text-anchor="middle" fill="#f7931a" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700">BTC</text>
      <text x="48" y="30" fill="#9ba3b4" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="500">Bitcoin</text>
      <text x="14" y="66" fill="#ffffff" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700">Live</text>
      <text x="14" y="85" fill="#00f5c4" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600">↑ Real-time OKX</text>
    </g>
    <!-- ETH card -->
    <g transform="translate(200,0)">
      <rect x="0" y="0" width="180" height="96" rx="14" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)"/>
      <circle cx="24" cy="24" r="14" fill="rgba(98,126,234,0.18)"/>
      <text x="24" y="28" text-anchor="middle" fill="#627eea" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700">ETH</text>
      <text x="48" y="30" fill="#9ba3b4" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="500">Ethereum</text>
      <text x="14" y="66" fill="#ffffff" font-family="Inter,system-ui,sans-serif" font-size="22" font-weight="700">Live</text>
      <text x="14" y="85" fill="#00f5c4" font-family="Inter,system-ui,sans-serif" font-size="12" font-weight="600">↑ Real-time OKX</text>
    </g>
  </g>

  <!-- Bottom URL ribbon -->
  <g transform="translate(80,560)">
    <text fill="#6b7280" font-family="Inter,system-ui,sans-serif" font-size="18" font-weight="500">theouyi.com</text>
    <text x="1040" text-anchor="end" fill="#6b7280" font-family="Inter,system-ui,sans-serif" font-size="13">OuYi Hub · Crypto Made Easy</text>
  </g>
</svg>
