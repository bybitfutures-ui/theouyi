cnt:{zh:'## 什么是加密货币？\n\n加密货币是基于区块链技术的数字资产，具有去中心化、不可篡改等特点。\n\n## 主流币种\n\n**比特币（BTC）** 是市值最大的加密货币，被称为"数字黄金"。\n\n**以太坊（ETH）** 支持智能合约，是DeFi和NFT生态的基础。\n\n## 如何购买\n\n1. 选择可信交易所（推荐OKX）\n2. 完成注册和KYC认证\n3. 通过C2C或银行卡入金\n4. 购买目标币种\n\n## 安全建议\n\n- 务必开启2FA双重认证\n- 了解投资项目基本面\n- 不投入超过承受能力的金额\n\n> 投资有风险，入市需谨慎。',

ko:'## 암호화폐란?\n\n암호화폐는 블록체인 기반 디지털 자산으로 탈중앙화, 변조 불가 특성을 가집니다.\n\n## 주요 코인\n\n**비트코인(BTC)** 은 시가총액 1위로 "디지털 금"이라 불립니다.\n\n**이더리움(ETH)** 은 스마트 컨트랙트를 지원하며 DeFi와 NFT의 기반입니다.\n\n## 구매 방법\n\n1. 신뢰할 수 있는 거래소 선택 (OKX 추천)\n2. 가입 및 KYC 인증\n3. P2P 또는 카드로 입금\n4. 원하는 코인 구매\n\n## 보안 조언\n\n- 반드시 2FA 활성화\n- 프로젝트 기본사항 이해\n- 감당 가능한 금액만 투자\n\n> 투자에는 위험이 따릅니다. 신중하세요.'}},

let lang=localStorage.getItem('csp_lang')||'zh';

const ogLocale=({zh:'zh_CN','zh-TW':'zh_TW',en:'en_US',ko:'ko_KR'})[l];
document.documentElement.lang=htmlLang;
document.body.dataset.lang=l;
// Dynamic SEO meta updates for each language (critical for multi-language SEO)
document.title=tr('seo_title');
const md=document.querySelector('meta[name="description"]');if(md)md.setAttribute('content',tr('seo_desc'));
const ogt=document.querySelector('meta[property="og:title"]');if(ogt)ogt.setAttribute('content',tr('seo_title'));
const ogd=document.querySelector('meta[property="og:description"]');if(ogd)ogd.setAttribute('content',tr('seo_desc'));
const ogl=document.querySelector('meta[property="og:locale"]');if(ogl)ogl.setAttribute('content',ogLocale);
document.getElementById('lcur').textContent=T[l].name;
document.getElementById('lmenu').classList.remove('op');

rr()}

function sto(fn,ms){setTimeout(fn,ms||100)}
function sTo(id){const e=document.getElementById(id);if(e)e.scrollIntoView({behavior:'smooth'})}
function go(p){location.hash=p?'/'+p:'/';window.scrollTo(0,0)}
function fN(n){if(!n&&n!==0)return'--';n=parseFloat(n);if(n>=1e3)return n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});if(n>=1)return n.toFixed(2);if(n>=0.01)return n.toFixed(4);return n.toFixed(6)}
function fB(n){n=parseFloat(n);if(n>=1e12)return(n/1e12).toFixed(1)+'T';if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';return n?.toLocaleString()||'--'}
function cn(sym){return T[lang].coin_names?.[sym]||sym}
function pL(obj){if(!obj)return'';return obj[lang]||obj.zh||obj.en||Object.values(obj)[0]||''}

// OKX API (live market data)
// ══════════════════════════════════════════════════════════════
async function fp(){
  const insts=D.coins.filter(c=>c.on).map(c=>c.inst);if(!insts.length)return;
  try{
    const r=await fetch('https://www.okx.com/api/v5/market/tickers?instType=SPOT');
    const d=await r.json();
    if(d.code==='0'){
      const need=new Set(insts);
      d.data.filter(t=>need.has(t.instId)).forEach(t=>{
        const o=parseFloat(t.open24h),l=parseFloat(t.last);
        PC[t.instId]={price:l,chg:o?((l-o)/o*100):0,high:parseFloat(t.high24h),low:parseFloat(t.low24h),vol:parseFloat(t.volCcy24h)};
      });
      uTk();
    }
  }catch(e){
    // Fallback CoinGecko
    try{
      const map={BTC:'bitcoin',ETH:'ethereum',SOL:'solana',DOGE:'dogecoin',XRP:'ripple',ADA:'cardano'};
      const ids=[...new Set(D.coins.filter(c=>c.on).map(c=>map[c.sym]).filter(Boolean))].join(',');
      if(!ids)return;
      const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids='+ids+'&vs_currencies=usd&include_24hr_change=true&include_24hr_vol=true');
      if(r.ok){const d=await r.json();D.coins.filter(c=>c.on).forEach(c=>{const cg=map[c.sym];if(!cg||!d[cg])return;PC[c.inst]={price:d[cg].usd,chg:d[cg].usd_24h_change||0,vol:d[cg].usd_24h_vol||0}});uTk()}
    }catch(e2){}
  }
  setTimeout(fp,30000);
}
function uTk(){D.coins.filter(c=>c.on).forEach(c=>{const p=PC[c.inst];if(!p)return;const el=document.getElementById('tk-'+c.inst);if(!el)return;el.querySelector('.ti-pr').textContent='$'+fN(p.price);const ce=el.querySelector('.ti-ch');ce.textContent=(p.chg>=0?'+':'')+p.chg.toFixed(2)+'%';ce.className='ti-ch '+(p.chg>=0?'up':'dn')})}

function gr(){const h=location.hash.slice(1)||'';if(!h||h==='/')return{p:'home'};const s=h.split('/').filter(Boolean);if(s[0]==='coin'&&s[1])return{p:'coin',id:s[1]};if(s[0]==='article'&&s[1])return{p:'art',id:+s[1]};if(s[0]==='articles')return{p:'arts'};return{p:'home'}}
window.addEventListener('hashchange',rr);
window.addEventListener('load',()=>{setLang(lang);fp()});
function rr(){const r=gr();const a=document.getElementById('app');document.getElementById('nLinks').classList.remove('opn');switch(r.p){case'home':a.innerHTML=rHome();iHome();break;case'coin':a.innerHTML=rCoin(r.id);iCoin(r.id);break;case'art':a.innerHTML=rArt(r.id);break;case'arts':a.innerHTML=rArts();break}}

</div></header>
<section class="sc" id="exS"><div class="w"><div class="sh"><div class="sl" style="color:var(--blu)">${tr('ex_sl')}</div><h2>${tr('ex_t')}</h2><p class="sd">${tr('ex_d')}</p></div>
<div class="eg">${exData.map(ex=>`<article class="ec ${ex.cls}">${ex.ft?`<div class="etg">${tr('rec')}</div>`:''}<div class="eic">${ex.ic}</div><h3 class="en">${ex.nm}</h3><p class="esu">${ex.sub}</p><ul class="ef">${ex.fs.map(f=>`<li><span class="ck">✓</span>${f}</li>`).join('')}</ul><a class="eb" href="${ex.url}" target="_blank" rel="noopener noreferrer nofollow sponsored">${tr('go_reg')}</a></article>`).join('')}</div></div></section>
${tutData.map(tu=>`<section class="tu ${tu.cls}" id="${tu.id}"><div class="w"><div class="th"><div class="th-l"><div class="sl">${tu.lbl}</div><h2>${tu.tt}</h2><p class="sd">${tu.td}</p></div><div class="tt">⏱ ${tr('time_est')} ${tu.tm} ${tr('min')}</div></div>
<div class="sg">${tu.steps.slice(0,-1).map((s,i)=>`<div class="sp"><div class="sn">STEP 0${i+1}</div><h3 class="st">${s[0]}</h3><p class="sdd">${s[1]}</p>${s[2]?`<div class="stp">💡 ${s[2]}</div>`:''}</div>`).join('')}

<div class="tc"><a href="${tu.url}" target="_blank" rel="noopener noreferrer nofollow sponsored" class="bt" style="background:${tu.clr};color:var(--bg);box-shadow:0 3px 16px ${tu.clr}33">${tr('go_reg')}</a></div>
</div></section>`).join('')}
<section class="sc" id="artS"><div class="w"><div class="sh"><div class="sl" style="color:var(--grn)">${tr('art_sl')}</div><h2>${tr('art_t')}</h2><p class="sd">${tr('art_d')}</p></div>
<div class="ag">${D.arts.filter(a=>a.pub&&pL(a.title)).slice(0,6).map(a=>`<div class="ac" onclick="go('article/${a.id}')"><div class="adt">${a.date}</div><h3 class="att">${pL(a.title)}</h3><p class="aex">${pL(a.exc)}</p>${pL(a.tag)?`<span class="atg">${pL(a.tag)}</span>`:''}</div>`).join('')}</div>

${rFoot()}`}

function rCoin(id){const c=D.coins.find(x=>x.inst===id);
if(!c)return`<div class="w" style="padding:64px 0;text-align:center"><h2>Not Found</h2><button class="bt bt-o" onclick="go('')" style="margin-top:16px">${tr('back')}</button></div>`;
const p=PC[id]||{};const up=(p.chg||0)>=0;
return`<div class="cp"><div class="w"><a class="bk" onclick="go('')">${tr('back')}</a>
<div class="chd"><div class="chd-ic" style="background:${c.color}22;color:${c.color}">${c.sym.slice(0,2)}</div><h1>${cn(c.sym)}</h1><span class="sy">${c.sym}/USDT</span><span class="lv"><span class="live-dot"></span>OKX</span></div>
<div class="c-hero"><div class="c-hero-l">

function iCoin(id){
  const c=D.coins.find(x=>x.inst===id);if(!c)return;
  const el=document.getElementById('tvC');if(!el)return;
  const isMobile=window.innerWidth<=640;
  const loadTV=()=>{
    if(typeof TradingView==='undefined')return;
    el.innerHTML='';
    new TradingView.widget({
      autosize:true,
      symbol:c.tv,
      interval:'D',
      timezone:'Asia/Shanghai',
      theme:'dark',
      style:'1',
      locale:({zh:'zh_CN','zh-TW':'zh_TW',en:'en',ko:'kr'})[lang]||'en',
      enable_publishing:false,
      allow_symbol_change:!isMobile,
      container_id:'tvC',
      hide_side_toolbar:isMobile,
      hide_top_toolbar:false,
      hide_legend:isMobile,
      withdateranges:!isMobile,
      studies:isMobile?[]:['MASimple@tv-basicstudies','Volume@tv-basicstudies'],
      backgroundColor:'#0b1019',
      gridColor:'rgba(255,255,255,0.035)',
      toolbar_bg:'#0b1019'
    });
  };
  if(typeof TradingView!=='undefined'){loadTV();return}
  const s=document.createElement('script');s.src='https://s3.tradingview.com/tv.js';s.onload=loadTV;document.head.appendChild(s);
  // Reload widget on viewport size-class change so mobile/desktop configs stay correct
  let lastMob=isMobile;window._tvResize&&window.removeEventListener('resize',window._tvResize);
  window._tvResize=()=>{const nm=window.innerWidth<=640;if(nm!==lastMob){lastMob=nm;if(document.getElementById('tvC'))loadTV()}};
  window.addEventListener('resize',window._tvResize);
}

function md2h(m){if(!m)return'';return m.replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>').replace(/`(.+?)`/g,'<code>$1</code>').replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>').replace(/^\- (.+)$/gm,'<li>$1</li>').replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br>').replace(/^/,'<p>').replace(/$/,'</p>').replace(/<p><h/g,'<h').replace(/<\/h(\d)><\/p>/g,'</h$1>').replace(/<p><blockquote>/g,'<blockquote>').replace(/<\/blockquote><\/p>/g,'</blockquote>')}

function iHome(){uTk();const ob=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.style.opacity='1';e.target.style.transform='translateY(0)';ob.unobserve(e.target)}})},{threshold:.06});document.querySelectorAll('.sc,.tu').forEach(el=>{el.style.opacity='0';el.style.transform='translateY(14px)';el.style.transition='opacity .5s,transform .5s';ob.observe(el)})}
